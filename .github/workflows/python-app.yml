name: Build RetinaPrinter EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install pillow reportlab pywin32 pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed RetinaPrinter_v2.py --name RetinaPrinter

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: RetinaPrinter_EXE
          path: dist/RetinaPrinter.exe
